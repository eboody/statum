name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all --check
      - name: Docs link check
        run: bash scripts/check_readme_links.sh
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Doc tests
        run: cargo test --doc --workspace
      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  msrv-1-93:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-1-93-${{ hashFiles('**/Cargo.lock') }}
      - name: Check
        run: cargo check --workspace
      - name: Format check
        run: cargo fmt --all --check
      - name: Docs link check
        run: bash scripts/check_readme_links.sh
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Doc tests
        run: cargo test --doc --workspace
      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  security-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: taiki-e/install-action@cargo-deny
      - name: cargo-deny
        run: cargo deny check advisories bans sources

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: taiki-e/install-action@cargo-audit
      - name: cargo-audit
        run: cargo audit -d /tmp/advisory-db

  publish-dry-run:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - name: Publish readiness (ordered)
        run: bash scripts/check_publish_dry_run.sh

  nightly-canary:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Nightly build
        run: cargo build --workspace
