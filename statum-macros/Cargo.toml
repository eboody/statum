[dependencies]
quote = "1.0"

[dependencies.macro_registry]
path = "../macro_registry"
version = "0.5.1"

[dependencies.moddef]
version = "0.2.6"

[dependencies.proc-macro2]
features = []
version = "1.0"

[dependencies.syn]
features = [
    "full",
    "visit-mut",
    "visit",
]
version = "2.0"

[dev-dependencies]
bon = "3.3.2"
futures = "0.3"
trybuild = "1.0"

[dev-dependencies.statum-core]
path = "../statum-core"
version = "0.5.1"

[features]
default = []

[lib]
proc-macro = true

[package]
authors = ["Eran Boodnero <eran@eran.codes>"]
categories = ["rust-patterns"]
description = "Compile-time state machine magic for Rust: Zero-boilerplate typestate patterns with automatic transition validation"
documentation = "https://docs.rs/statum"
edition = "2024"
keywords = [
    "enum",
    "typestate",
    "fsm",
    "finite-state",
    "state-machine",
]
license = "MIT"
name = "statum-macros"
readme = "README.md"
repository = "https://github.com/eboody/statum"
rust-version = "1.93"
version = "0.5.1"
